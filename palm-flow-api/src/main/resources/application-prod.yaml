spring:
  cloud:
    azure:
      keyvault:
        secret:
          endpoint: https://uumbalsecrets.vault.azure.net/
          property-sources:
            - name: uumbalsecrets
              endpoint: https://uumbalsecrets.vault.azure.net/
      credential:
        managed-identity:
          enabled: true
  datasource:
    username: ${palm-flow-api-sql-user}
    password: ${palm-flow-api-sql-password}
    url: jdbc:sqlserver://SQL8012.site4now.net;databaseName=db_a986f5_palmflow;trustServerCertificate=true
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  frontend:
    base-url: ${FRONTEND_BASE_URL:}