server:
  port: 8081
  servlet:
    context-path: /palmFlowApi
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

# JWT (override secret in prod)
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-minimum-length-required}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:4200,http://localhost:8100,http://localhost:5173
  mail:
    from: noreply@palmflow.local
  frontend:
    base-url: http://localhost:4200
  storage:
    recepciones-dir: ${RECEPCIONES_FOTOS_DIR:./data/recepciones-fotos}
    max-file-size-bytes: 5242880

# Springdoc / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized