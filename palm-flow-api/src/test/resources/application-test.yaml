spring:
  datasource:
    url: jdbc:h2:mem:palmflow;MODE=MSSQLServer;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  mail:
    host: 127.0.0.1
    port: 3025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
