server:
  port: 8080
  servlet:
    context-path: /sigefor

spring:
  application:
    name: fornituras-api
  profiles:
    active: dev
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:fornituras};encrypt=true;trustServerCertificate=true
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    check-template-location: true
  servlet:
    multipart:
      # Límite de subida de fotos (017): coherente con app.media.max-size-bytes (5 MB). El request
      # admite algo más para cubrir las partes de metadatos del multipart.
      max-file-size: 5MB
      max-request-size: 6MB

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: 86400000
  qr:
    prefix: FOR-
    sequence-length: 6
    max-batch-size: 10000
  pii:
    # Cifrado de PII a nivel de aplicación (ADR 0006). Valores SOLO por entorno; nunca en el repo.
    encryption-key: ${PII_ENCRYPTION_KEY:}
    blind-index-key: ${OFFICER_BLIND_INDEX_KEY:}
  media:
    # Almacenamiento de fotos (017, ADR 0016). La ruta vive fuera del repo y llega por entorno
    # (Principio III); nunca se versiona su valor. Objetos cifrados AES-256-GCM en disco.
    storage-path: ${MEDIA_STORAGE_PATH:./data/media}
    max-size-bytes: ${MEDIA_MAX_SIZE_BYTES:5242880}   # 5 MB
    max-width: ${MEDIA_MAX_WIDTH:4096}
    max-height: ${MEDIA_MAX_HEIGHT:4096}
    allowed-types:
      - image/jpeg
      - image/png
      - image/webp
    # Gating de captura de foto de elemento (PII): deshabilitada hasta base legal ADR 0003 (FR-015).
    officer-photo-enabled: ${MEDIA_OFFICER_PHOTO_ENABLED:false}
  seed:
    admin:
      enabled: true
      name: Administrador
      email: maguilleng@outlook.com
      password: ${SEED_ADMIN_PASSWORD:F0rn1tur4s#}
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8100
      - capacitor://localhost
  mail:
    from: ${MAIL_FROM:noreply@fornituras.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  paths-to-match: /api/v1/**

logging:
  level:
    com.numobiz.solutions.fornituras: INFO
    org.springframework.security: WARN
