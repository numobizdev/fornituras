server:
  port: 8080

spring:
  application:
    name: fornituras-api
  profiles:
    active: dev
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:fornituras};encrypt=true;trustServerCertificate=true
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    check-template-location: true

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: 86400000
  qr:
    prefix: FOR-
    suffix-length: 5
    max-batch-size: 10000
    max-generation-retries: 100
  seed:
    admin:
      enabled: true
      name: Administrador
      email: maguilleng@outlook.com
      password: ${SEED_ADMIN_PASSWORD:F0rn1tur4s#}
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8100
      - capacitor://localhost

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.numobiz.solutions.fornituras: INFO
    org.springframework.security: WARN
