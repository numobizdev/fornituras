spring:
  datasource:
    url: jdbc:h2:mem:fornituras_test;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  servlet:
    multipart:
      # Por encima de app.media.max-size-bytes para que el 413 lo produzca la validación de peso del
      # servicio (determinista), no el resolver de multipart.
      max-file-size: 10MB
      max-request-size: 12MB
  mail:
    host: localhost
    port: 1025

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 3600000
  qr:
    prefix: FOR-
    sequence-length: 6
    max-batch-size: 10000
  seed:
    admin:
      enabled: false
  mail:
    from: test@fornituras.local
  # Claves de prueba (no secretas): habilitan cifrado de PII y blind index para los tests de
  # integración que persisten elementos del padrón (003) — p. ej. los reportes (011).
  pii:
    encryption-key: DCEUhley+zGGDQpInyELd/2hCM4iRgCQVPilR7i1au8=
    blind-index-key: test-blind-index-key
  # Media (017): storage temporal para los tests de integración; peso máximo bajo para probar 413 sin
  # arrays enormes. El gate de foto de elemento se habilita para poder ejercitar el flujo PII (US2).
  media:
    storage-path: ${java.io.tmpdir}/sigefor-media-test
    max-size-bytes: 1048576   # 1 MB
    max-width: 4096
    max-height: 4096
    allowed-types:
      - image/jpeg
      - image/png
      - image/webp
    officer-photo-enabled: true
