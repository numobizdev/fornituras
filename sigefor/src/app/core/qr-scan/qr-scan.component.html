<div class="qr-scan">
  <div class="qr-scan__row">
    <ion-input
      class="qr-scan__input"
      fill="outline"
      aria-label="Código de la fornitura"
      autocapitalize="characters"
      autocomplete="off"
      spellcheck="false"
      enterkeyhint="search"
      [placeholder]="placeholder()"
      [value]="value()"
      (ionInput)="onInput($event.detail.value ?? '')"
      (keydown)="onKeyDown($event)"></ion-input>

    @if (cameraSupported) {
      <ion-button
        type="button"
        fill="outline"
        color="primary"
        class="qr-scan__camera-btn"
        aria-label="Escanear código QR con la cámara"
        [disabled]="isScanning()"
        (click)="startCamera()">
        @if (isScanning()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon slot="icon-only" name="camera-outline" aria-hidden="true"></ion-icon>
        }
      </ion-button>
    }

    <ion-button type="button" [disabled]="!canSubmit()" (click)="submitManual()">
      {{ actionLabel() }}
    </ion-button>
  </div>

  @if (formatError()) {
    <ion-note color="danger" role="alert">El código no tiene el formato esperado (FOR-XXXXX).</ion-note>
  }
</div>
