<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Usuarios</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-segment [value]="filter()" (ionChange)="onFilterChange($any($event.detail.value))">
    <ion-segment-button value="active">
      <ion-label>Activos</ion-label>
    </ion-segment-button>
    <ion-segment-button value="inactive">
      <ion-label>Inactivos</ion-label>
    </ion-segment-button>
  </ion-segment>

  @if (isLoading()) {
    <div class="state-message">
      <ion-spinner></ion-spinner>
    </div>
  } @else if (users().length === 0) {
    <div class="state-message">
      <p>No hay usuarios en esta vista.</p>
    </div>
  } @else {
    <ion-list>
      @for (user of users(); track user.id) {
        <ion-item button (click)="goToEdit(user)" [detail]="false">
          <ion-label>
            <h2>{{ user.name }}</h2>
            <ion-note color="medium">{{ user.email }}</ion-note>
          </ion-label>
          <ion-badge slot="end" [color]="user.role === 'ADMIN' ? 'primary' : 'medium'">
            {{ roleLabels[user.role] }}
          </ion-badge>
          <ion-button
            slot="end"
            fill="clear"
            (click)="goToEdit(user); $event.stopPropagation()"
            aria-label="Editar">
            <ion-icon slot="icon-only" name="create-outline"></ion-icon>
          </ion-button>
          <ion-button
            slot="end"
            fill="clear"
            (click)="changeRole(user); $event.stopPropagation()"
            aria-label="Cambiar rol">
            <ion-icon slot="icon-only" name="ribbon-outline"></ion-icon>
          </ion-button>
          <ion-button
            slot="end"
            fill="clear"
            [color]="user.enabled ? 'danger' : 'success'"
            (click)="confirmToggleEnabled(user); $event.stopPropagation()"
            [attr.aria-label]="user.enabled ? 'Desactivar' : 'Activar'">
            <ion-icon slot="icon-only" name="power-outline"></ion-icon>
          </ion-button>
        </ion-item>
      }
    </ion-list>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="goToNew()" aria-label="Nuevo usuario">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
