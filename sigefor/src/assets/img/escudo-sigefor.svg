<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 112" role="img" aria-label="Emblema SIGEFOR">
  <!-- Emblema provisional (021): escudo estilizado en dorado/blanco sobre fondo transparente.
       Sustituir por el emblema oficial de la corporación cuando se entregue. -->
  <defs>
    <linearGradient id="oro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9a24a"/>
      <stop offset="1" stop-color="#a57f2c"/>
    </linearGradient>
  </defs>
  <!-- Contorno del escudo -->
  <path d="M48 4 L88 16 V56 C88 82 71 100 48 108 C25 100 8 82 8 56 V16 Z"
        fill="none" stroke="url(#oro)" stroke-width="5" stroke-linejoin="round"/>
  <!-- Escudo interior -->
  <path d="M48 14 L79 23.5 V55 C79 76 65.5 90.5 48 97.5 C30.5 90.5 17 76 17 55 V23.5 Z"
        fill="url(#oro)" opacity="0.16"/>
  <!-- Estrella de cinco puntas -->
  <path d="M48 32 L53.4 47.2 L69.5 47.5 L56.7 57.2 L61.4 72.6 L48 63.4 L34.6 72.6 L39.3 57.2 L26.5 47.5 L42.6 47.2 Z"
        fill="url(#oro)"/>
  <!-- Barra inferior -->
  <rect x="34" y="80" width="28" height="5" rx="2.5" fill="url(#oro)"/>
</svg>
